<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h2>상품 자료 조회 (Async/Await + Axios)</h2>
    <button id="loadBtn">데이터 로드</button>
    <div id="status"></div>
    <table id="resultTable">
    </table>
    <script>
        document.getElementById("loadBtn").addEventListener("click", loadData);

        async function loadData() {
            const resultBody = document.getElementById("resultBody");
            const thead = document.querySelector("#resultTable thead");
            const status = document.getElementById("status");

            status.textContent = "데이터를 불러오는 중...";
            
            try {
                // 2. await를 사용하여 서버 응답을 기다림
                const response = await axios.get("/api/sangdata");
                const data = response.data;

                const table = document.getElementById("resultTable");
                table.innerHTML ="";
                if(data.length ===0){
                    table.innerHTML = "<tr><td>자료 없음</td></tr>";
                    return;
                }

                let headerRow = "<tr>";
                    // [{code:1,dan:230,sang:"커피"...}]
                    Object.keys(data[0]).forEach(key => {
                        headerRow += `<th>${key}</th>`;
                    })
                headerRow += "</tr>";
                table.innerHTML += headerRow;

                //자료 채우기
                data.forEach(row => {
                    let lowHtml = "<tr>";
                        Object.values(row).forEach(value => {
                            lowHtml += `<td>${value}</td>`;
                        })
                        lowHtml += "</tr>";
                        table.innerHTML += lowHtml;
                    })
            } catch (error) {
                // 5. 에러 처리
                console.error("데이터 로드 실패:", error);
                status.textContent = "오류가 발생했습니다.";
                alert("서버 통신 오류: " + error.message);
            }
        }

    </script>
</body>
</html>
